<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товар — OpenWing</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <header class="header">
    <div class="header__bar">
      <a href="index.html" class="header__logo" aria-label="OpenWing — на главную"></a>
      <nav class="nav" aria-label="Основная навигация">
        <a href="index.html" class="nav__btn" data-page="index">Главная</a>
        <a href="tickets.html" class="nav__btn" data-page="tickets">Билеты</a>
        <a href="events.html" class="nav__btn" data-page="events">События</a>
        <a href="reviews.html" class="nav__btn" data-page="reviews">Отзывы</a>
        <a href="merch.html" class="nav__btn" data-page="merch">Мерч</a>
      </nav>
      <div class="header__actions">
        <a href="cart.html" class="header__cart" id="cart-link">Корзина</a>
        <a href="index.html" class="header__home" id="home-btn" aria-label="На главную, в начало"><svg viewBox="0 0 45 45" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M42.7193 22.6003H39.8417V44.9999H5.28822V22.6003H2.0088L22.3641 -9.96248e-05L42.7193 22.6003Z" fill="currentColor"/></svg></a>
      </div>
      <button type="button" class="header__burger" id="burger" aria-label="Меню" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main>
    <!-- DIV 5.1 — карточка товара -->
    <section class="section product" id="product">
      <a href="merch.html" class="product__back">Назад</a>

      <div class="product__grid">
        <!-- Левая колонка: изображение + цена -->
        <div class="product__left">
          <div class="product__image" data-tint="none">
            <img id="product-img" src="" alt="">
            <span class="product__tint"></span>
          </div>
          <p class="product__price" id="product-price"></p>
        </div>

        <!-- Правая колонка -->
        <div class="product__right">
          <h1 class="product__title" id="product-title"></h1>
          <p class="product__desc" id="product-desc"></p>

          <div class="product__colors">
            <div class="product__swatches" id="product-swatches"></div>
            <p class="product__color-label" id="product-color">Цвет: обычный</p>
          </div>

          <div class="product__rating">
            <span class="product__rating-label">Рейтинг:</span>
            <span class="rating" id="product-stars"></span>
          </div>

          <button type="button" class="product__add" id="product-add">в корзину</button>
        </div>
      </div>
    </section>

    <!-- DIV 5.2 — отзывы на товар -->
    <section class="section section--reviews reviews-block">
      <h2 class="reviews__title">Отзывы</h2>
      <form class="review-form" data-reviews="merch" data-infinite="true" autocomplete="off">
        <span class="review__avatar"><img src="assets/images/div4/avatar.webp" alt=""></span>
        <div class="review-form__body">
          <div class="review-form__top">
            <input type="text" class="review-form__name" name="name" placeholder="Введите имя" maxlength="40" required>
            <div class="rating rating--input" data-rating-input role="radiogroup" aria-label="Оценка"></div>
          </div>
          <input type="text" class="review-form__text" name="text" placeholder="Оставьте отзыв" maxlength="300" required>
        </div>
        <button type="submit" class="review-form__submit">Отправить</button>
      </form>
      <div class="reviews__pool" data-reviews-pool tabindex="0" aria-label="Лента отзывов на товар"></div>
    </section>
  </main>

  <div class="nav-overlay" id="nav-overlay"></div>
  <script src="scripts/catalog.js"></script>
  <script src="scripts/main.js"></script>
  <script src="scripts/product.js"></script>
  <script src="scripts/reviews.js"></script>
</body>
</html>
