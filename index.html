<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenWing — авиабилеты от 100 ₽</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <header class="header">
    <div class="header__bar">
      <a href="index.html" class="header__logo" aria-label="OpenWing — на главную"></a>
      <nav class="nav" aria-label="Основная навигация">
        <a href="index.html" class="nav__btn" data-page="index">Главная</a>
        <a href="tickets.html" class="nav__btn" data-page="tickets">Билеты</a>
        <a href="events.html" class="nav__btn" data-page="events">События</a>
        <a href="reviews.html" class="nav__btn" data-page="reviews">Отзывы</a>
        <a href="merch.html" class="nav__btn" data-page="merch">Мерч</a>
      </nav>
      <div class="header__actions">
        <a href="cart.html" class="header__cart" id="cart-link">Корзина</a>
        <a href="index.html" class="header__home" id="home-btn" aria-label="На главную, в начало"><svg viewBox="0 0 45 45" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M42.7193 22.6003H39.8417V44.9999H5.28822V22.6003H2.0088L22.3641 -9.96248e-05L42.7193 22.6003Z" fill="currentColor"/></svg></a>
      </div>
      <button type="button" class="header__burger" id="burger" aria-label="Меню" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main>
    <!-- DIV 1 — ГЛАВНАЯ -->
    <section class="section section--hero">
      <a href="pricing.html" class="hero__banner" aria-label="Тарифы OpenWing+">
        <span class="hero__pill hero__pill--title">Свои плюсы<br>в OpenWing+</span>
        <span class="hero__pill hero__pill--price">от 100 ₽</span>
      </a>
      <ul class="cities">
        <li class="cities__item"><a href="tickets.html" class="city" data-city="Уфа"><span class="city__photo"><img src="assets/images/div1/city-ufa.webp" alt="Уфа" loading="lazy"></span><span class="city__name">Уфа</span></a></li>
        <li class="cities__item"><a href="tickets.html" class="city" data-city="Краснодар"><span class="city__photo"><img src="assets/images/div1/city-krasnodar.webp" alt="Краснодар" loading="lazy"></span><span class="city__name">Краснодар</span></a></li>
        <li class="cities__item"><a href="tickets.html" class="city" data-city="Москва"><span class="city__photo"><img src="assets/images/div1/city-moscow.webp" alt="Москва" loading="lazy"></span><span class="city__name">Москва</span></a></li>
        <li class="cities__item"><a href="tickets.html" class="city" data-city="Питер"><span class="city__photo"><img src="assets/images/div1/city-piter.webp" alt="Санкт-Петербург" loading="lazy"></span><span class="city__name">Питер</span></a></li>
        <li class="cities__item"><a href="tickets.html" class="city" data-city="Казань"><span class="city__photo"><img src="assets/images/div1/city-kazan.webp" alt="Казань" loading="lazy"></span><span class="city__name">Казань</span></a></li>
        <li class="cities__item"><a href="tickets.html" class="city" data-city="Волгоград"><span class="city__photo"><img src="assets/images/div1/city-volgograd.webp" alt="Волгоград" loading="lazy"></span><span class="city__name">Волгоград</span></a></li>
        <li class="cities__item"><a href="tickets.html" class="city" data-city="Волгда"><span class="city__photo"><img src="assets/images/div1/city-volgda.webp" alt="Волгда" loading="lazy"></span><span class="city__name">Волгда</span></a></li>
        <li class="cities__item"><a href="tickets.html" class="city" data-city="Тау Кита"><span class="city__photo"><img src="assets/images/div1/city-tau-kita.webp" alt="Тау Кита" loading="lazy"></span><span class="city__name">Тау Кита</span></a></li>
      </ul>
    </section>
  </main>

  <div class="nav-overlay" id="nav-overlay"></div>
  <script src="scripts/catalog.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
